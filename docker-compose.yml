version: '3.8'

services:
  app:
    build: .
    ports:
      - "3000:3000"
    env_file:
      - .env
    depends_on:
      - db
    # IMPORTANTE: Mapeamos la carpeta local al contenedor
    volumes:
      - ./uploads:/app/uploads
    command: sh -c "npx prisma db push && node src/app.js"
    restart: always

  db:
    image: postgres:15
    container_name: superposition_db
    restart: always
    env_file:
      - .env
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data

volumes:
  pgdata: